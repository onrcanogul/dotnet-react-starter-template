# Local development dependencies. The API itself runs on the host
# (`dotnet run`) so it stays attached to a debugger; everything it talks to
# lives here. Credentials are local-only throwaways.
#
#   docker compose up -d
#
services:
  postgres:
    image: postgres:16-alpine
    container_name: template-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Template-DB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: template-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: template-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: template-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: template-jaeger
    restart: unless-stopped
    environment:
      # Jaeger ingests OTLP directly; the Collector's standalone jaeger
      # exporter was removed upstream.
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    container_name: template-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-config.yml"]
    volumes:
      - ./otel-config.yml:/etc/otel-config.yml:ro
    ports:
      - "4317:4317"  # OTLP gRPC - the API exports here
      - "4318:4318"  # OTLP HTTP
    depends_on:
      - jaeger

volumes:
  postgres_data:
